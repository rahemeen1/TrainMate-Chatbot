name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build project
        working-directory: ./frontend
        env:
          CI: "false"
          REACT_APP_API_BASE_URL: "${{ secrets.REACT_APP_API_BASE_URL }}"
        run: npm run build

      - name: Validate Firebase deploy secrets
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" ] && [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRAINMATE_CHATBOT }}" ]; then
            echo "Missing Firebase service account secret."
            echo "Set FIREBASE_SERVICE_ACCOUNT or FIREBASE_SERVICE_ACCOUNT_TRAINMATE_CHATBOT in GitHub repository secrets."
            exit 1
          fi

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: "${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' && secrets.FIREBASE_SERVICE_ACCOUNT || secrets.FIREBASE_SERVICE_ACCOUNT_TRAINMATE_CHATBOT }}"
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          node -e "const fs=require('fs'); const p=process.env.RUNNER_TEMP + '/firebase-service-account.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); if(!j.project_id||!j.client_email||!j.private_key){throw new Error('Invalid Firebase service account JSON');} console.log('Firebase credentials loaded for project:', j.project_id);"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy to Firebase Hosting
        working-directory: ./frontend
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only hosting --project trainmate-chatbot --config firebase.json --non-interactive --debug